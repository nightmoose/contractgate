# ─────────────────────────────────────────────────────────────────────────────
# ContractGate Semantic Validator SMT — example connector configuration
#
# Drop these transforms.* lines into any existing Kafka Connect connector config.
# The SMT validates every record in real-time against the specified contract;
# failures are routed to the dead-letter topic you configure below.
#
# Full documentation: https://datacontractgate.com/docs/kafka-connect
# ─────────────────────────────────────────────────────────────────────────────

# ── Register the SMT ──────────────────────────────────────────────────────────
transforms=contractgate
transforms.contractgate.type=io.datacontractgate.connect.smt.ContractGateValidator

# ── Required ──────────────────────────────────────────────────────────────────

# Base URL of your ContractGate API server (no trailing slash).
transforms.contractgate.contractgate.api.url=https://contractgate-api.fly.dev

# UUID of the contract to validate against.
# Obtain from the ContractGate dashboard or GET /contracts.
transforms.contractgate.contractgate.contract.id=YOUR-CONTRACT-UUID-HERE

# ── Authentication ────────────────────────────────────────────────────────────

# API key for the x-api-key header.
# In production, use a secret reference:
#   ${file:/opt/confluent/secrets/contractgate.properties:api.key}
# Leave blank only when running the server in dev / no-auth mode.
transforms.contractgate.contractgate.api.key=

# ── Contract version (optional) ───────────────────────────────────────────────

# Pin to a specific contract version (e.g. "1.2.0").
# Leave blank to always resolve to the latest stable version automatically.
# Recommended: leave blank in dev, pin in production.
transforms.contractgate.contractgate.contract.version=

# ── Validation mode ───────────────────────────────────────────────────────────

# Set to true to validate without writing to the ContractGate audit log.
# Useful for high-throughput pipelines where you need enforcement but want
# to avoid DB write pressure. Default: false (full audit trail).
transforms.contractgate.contractgate.dry.run=false

# ── Failure action ────────────────────────────────────────────────────────────

# DLQ          (default) — invalid records throw DataException and are routed
#              to errors.deadletterqueue.topic.name (see below).
# TAG_AND_PASS — invalid records get violation headers and continue downstream.
transforms.contractgate.contractgate.on.failure=DLQ

# ── HTTP timeouts ─────────────────────────────────────────────────────────────

transforms.contractgate.contractgate.connect.timeout.ms=5000
transforms.contractgate.contractgate.request.timeout.ms=10000

# ── Result headers ────────────────────────────────────────────────────────────

# Add contractgate.* metadata headers to every record (pass or fail).
# Headers: contractgate.passed, contractgate.contract.version,
#          contractgate.violations.count,
#          contractgate.violation.N.field/kind/message
transforms.contractgate.contractgate.add.result.headers=true

# Maximum number of individual violation headers to add per record.
# High violation counts can bloat headers — cap at a useful number.
transforms.contractgate.contractgate.max.violation.headers=5


# ─────────────────────────────────────────────────────────────────────────────
# Dead-letter queue configuration (Kafka Connect framework settings)
# These are connector-level settings, not SMT settings.
# ─────────────────────────────────────────────────────────────────────────────

# Route failed records to this topic (must exist, or auto-create must be enabled).
errors.deadletterqueue.topic.name=your-topic.dlq
errors.deadletterqueue.topic.replication.factor=3

# Include the DataException message and original record in DLQ record headers.
# Essential for debugging — shows which contract, which violations, which offset.
errors.deadletterqueue.context.headers.enable=true

# Log each DLQ-routed record (noisy at high error rates — set to false if needed).
errors.log.enable=true
errors.log.include.messages=true
