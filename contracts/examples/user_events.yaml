# Example Contract: User Behavior Events
# ContractGate (Patent Pending)
#
# This contract enforces schema and semantic rules on raw user
# event data before it reaches your warehouse or AI pipeline.

version: "1.0"
name: "user_events"
description: "User behavior events — click, view, purchase, signup"

ontology:
  entities:
    - name: user_id
      type: string
      required: true
      pattern: "^[a-zA-Z0-9_-]{3,64}$"
      min_length: 3
      max_length: 64

    - name: event_type
      type: string
      required: true
      enum:
        - "click"
        - "view"
        - "purchase"
        - "signup"
        - "logout"

    - name: timestamp
      type: integer
      required: true
      min: 0

    - name: session_id
      type: string
      required: false
      pattern: "^[a-f0-9]{32}$"

    - name: amount
      type: float
      required: false
      min: 0.0
      max: 1000000.0

    - name: metadata
      type: object
      required: false
      properties:
        - name: page
          type: string
          required: false
          max_length: 512
        - name: referrer
          type: string
          required: false
          max_length: 512

glossary:
  - term: "user_id"
    definition: "Unique, stable identifier for a registered user in the system"
    synonyms: ["uid", "userId"]

  - term: "event_type"
    definition: "High-level category describing the action a user performed"
    synonyms: ["action", "eventName"]

  - term: "timestamp"
    definition: "Unix epoch timestamp (seconds) when the event occurred on the client"
    synonyms: ["ts", "event_time"]

  - term: "session_id"
    definition: "32-character hex token identifying the user's browser session"
    synonyms: ["sid", "sessionId"]

metrics:
  - name: "purchase_amount"
    field: "amount"
    type: float
    min: 0.0
    max: 1000000.0
