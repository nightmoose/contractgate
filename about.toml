# cargo-about configuration — third-party license inventory for diligence.
# Generate: cargo about generate about.hbs > docs/data-room/dependency-licenses.md
# (or use the markdown template below via `cargo about generate`)
#
# Install: cargo install cargo-about

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]

# Clarify dual-licensed crates (common in Rust).
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

[about]
# Ignore build-only / dev-only noise if needed later via ignore crates.
