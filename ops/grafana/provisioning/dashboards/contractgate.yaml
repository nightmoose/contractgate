# Grafana dashboard provisioning config (RFC-017).
#
# Tells Grafana to load dashboards from the specified path on startup.
# The ContractGate dashboard JSON is at ops/grafana/contractgate.json.
#
# contractgate.json ships six panels (RFC-016): request rate, validation
# latency p50/p95/p99, violation rate by kind, quarantine rate, active
# contracts gauge, and top-10 noisiest contracts.

apiVersion: 1

providers:
  - name: ContractGate
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
