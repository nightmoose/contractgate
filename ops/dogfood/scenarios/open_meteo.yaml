id: open_meteo
title: "Open-Meteo hourly weather (NYC)"
status: ready
vertical: weather / IoT-adjacent
product_surfaces:
  - infer_json
  - numeric_ranges
  - ingest_http
product_questions:
  - "Q1: Can time-series rows (flattened hourly) form a stable contract?"
  - "Q2: Do min/max on temperature and precipitation reject sensor glitches?"
  - "Q3: Is ISO-ish time string typing clear enough for operators?"
source:
  kind: http_json
  url: "https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.01&hourly=temperature_2m,precipitation,wind_speed_10m&forecast_days=1"
  notes: "No API key. Flatten hourly arrays into one record per hour."
sample:
  max_records: 24
  transform: open_meteo_hourly
contract:
  path: contracts/open_meteo.yaml
  name: open_meteo_hourly
mutations:
  - field: temperature_2m
    kind: out_of_range
    value: 9999
  - field: time
    kind: drop_required
  - field: precipitation
    kind: below_min
    value: -5
ui_path:
  wizard: "Contracts → New → API / sample JSON"
  verify:
    - playground
