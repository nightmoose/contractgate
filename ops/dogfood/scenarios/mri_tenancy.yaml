id: mri_tenancy
title: "MRI MIX-style tenancy events (proptech)"
status: ready
vertical: proptech / screening
product_surfaces:
  - hand_authored_yaml
  - semantic_enums
  - metrics_glossary
  - ingest_http
product_questions:
  - "Q1: Does the Findigs/MRI narrative hold with envelope + semantic fields?"
  - "Q2: Currency/status enums + rent min catch the bad rows partners actually send?"
  - "Q3: Glossary + metrics make the contract readable in a sales call?"
source:
  kind: synthetic
  notes: "Synthetic but schema-aligned with mri_tenancy_event.yaml / Findigs story. No real PII."
sample:
  max_records: 40
  transform: mri_synthetic
contract:
  path: contracts/mri_tenancy.yaml
  name: mri_tenancy_event
  seed_from: ../../../mri_tenancy_event.yaml
mutations:
  - field: status
    kind: bad_enum
    value: ghost
  - field: rent_amount
    kind: below_min
    value: -100
  - field: currency
    kind: bad_enum
    value: BTC
  - field: tenancy_id
    kind: drop_required
ui_path:
  wizard: "Contracts → New → Blank YAML (paste vertical contract)"
  verify:
    - playground
    - quarantine
    - report
