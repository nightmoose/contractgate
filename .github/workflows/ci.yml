# ContractGate CI — runs on every push and pull request to main.
#
# Jobs:
#   rust-check  — cargo check + clippy + unit tests (no DB needed)
#   dashboard   — Next.js type-check + lint
#   docker      — verify the Dockerfile builds (no push)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Tells sqlx to use cached .sqlx/ metadata instead of a live DB
  SQLX_OFFLINE: "true"

jobs:
  # ── Rust ──────────────────────────────────────────────────
  rust-check:
    name: Rust — check / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Style gate runs first — cheap, fails fast, anchors `rustfmt.toml`.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ── Next.js dashboard ─────────────────────────────────────
  dashboard:
    name: Dashboard — type-check / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm install
        run: npm install

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          # Point at localhost during CI; no real backend needed for static build
          NEXT_PUBLIC_API_URL: "http://localhost:3001"

  # ── Docker build smoke-test ───────────────────────────────
  docker:
    name: Docker — build smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t contractgate-api:ci .

  # ── CLI cross-compile smoke (RFC-014) ─────────────────────
  # Builds the `contractgate` CLI binary for all four release targets.
  # This job runs before tagging to confirm the cross-compile is healthy.
  # Full release tarballs are produced by the release.yml workflow.
  cli-cross-compile:
    name: CLI — cross-compile smoke (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build CLI (cross)
        if: matrix.cross == true
        run: cross build --release --bin contractgate --target ${{ matrix.target }}

      - name: Build CLI (native)
        if: matrix.cross != true
        run: cargo build --release --bin contractgate --target ${{ matrix.target }}
