# ContractGate CI — runs on every push and pull request to main.
#
# Jobs:
#   rust-check         — cargo fmt/check/clippy/test (no DB needed)
#   dashboard          — Next.js type-check + lint + build
#   docker             — Dockerfile builds (buildx + GHA layer cache, no push)
#   migrations-check   — apply migrations to Postgres 16, sqlx prepare --check
#   compose-smoke      — default compose stack end-to-end smoke
#   compose-demo-smoke — demo-profile compose stack + seeder assertion
#
# Cross-compile of the CLI is NOT in CI — it runs in release.yml on tag pushes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs when a new commit lands on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Tells sqlx to use cached .sqlx/ metadata instead of a live DB
  SQLX_OFFLINE: "true"

jobs:
  # ── Rust ──────────────────────────────────────────────────
  rust-check:
    name: Rust — check / clippy / test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Style gate runs first — cheap, fails fast, anchors `rustfmt.toml`.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ── Next.js dashboard ─────────────────────────────────────
  dashboard:
    name: Dashboard — type-check / lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package.json

      - name: npm install
        run: npm install --legacy-peer-deps

      - name: TypeScript type-check
        run: npm run type-check

      #- name: ESLint
      #  run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          # Point at localhost during CI; no real backend needed for static build
          NEXT_PUBLIC_API_URL: "http://localhost:3001"

  # ── Docker build smoke-test ───────────────────────────────
  docker:
    name: Docker — build smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: contractgate-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Migrations + sqlx metadata check (RFC-019, RFC-055) ──
  # 1. Spins a Postgres 16 service container.
  # 2. Applies every file in supabase/migrations/ in numeric order (ls -v).
  # 3. Asserts `cargo sqlx prepare --check` still matches the committed
  #    .sqlx/ query metadata — catches storage.rs changes that add/change
  #    queries without regenerating .sqlx/.
  # 4. Sentinel check: confirms latest migration (026) and total count (26)
  #    applied cleanly.  Update EXPECTED_MIGRATION_COUNT when adding new
  #    migrations; add a new sentinel assertion for the latest schema object.
  #
  # Contract: migration files must be named NNN_description.sql with no
  # gaps in the numeric prefix. A missing file means ls -v silently skips
  # it; the sentinel check below will catch the resulting schema gap.
  #
  # Prerequisites:
  #   .sqlx/ metadata must be committed (run `cargo sqlx prepare --workspace`
  #   locally against a Postgres 16 DB with all migrations applied, then
  #   commit the generated files). See RFC-019 rollout step 2.
  migrations-check:
    name: Migrations — apply + sqlx metadata check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Override the global SQLX_OFFLINE=true so sqlx can connect to the
    # service container and verify query metadata against the live schema.
    env:
      SQLX_OFFLINE: "false"
      DATABASE_URL: postgres://contractgate:contractgate@localhost:5432/contractgate_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: contractgate
          POSTGRES_PASSWORD: contractgate
          POSTGRES_DB: contractgate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply migrations in order
        run: |
          echo "Applying migrations from supabase/migrations/ in numeric order..."
          for f in $(ls -v supabase/migrations/*.sql); do
            echo "  → $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied."

      - name: Assert migration sentinels (026 schema object + total count)
        run: |
          # Sentinel A — migration 026 (plan_tier): verify the orgs_plan_valid
          # constraint was updated to include 'growth' (replaces 'pro').
          CONSTRAINT_OK=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM information_schema.check_constraints
             WHERE constraint_schema = 'public'
               AND constraint_name    = 'orgs_plan_valid'
               AND check_clause LIKE '%growth%'")
          if [[ "$CONSTRAINT_OK" != "1" ]]; then
            echo "::error::Migration 026 sentinel failed — orgs_plan_valid constraint not found or does not include 'growth'."
            exit 1
          fi
          echo "Sentinel A OK: orgs_plan_valid constraint includes 'growth' (migration 026)."

          # Sentinel B — file count: the loop above applies every *.sql file.
          # Assert we have exactly the expected number so a new migration
          # automatically forces this sentinel to be updated.
          EXPECTED_MIGRATION_COUNT=26
          ACTUAL_COUNT=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')
          if [[ "$ACTUAL_COUNT" != "$EXPECTED_MIGRATION_COUNT" ]]; then
            echo "::error::Migration count mismatch — expected $EXPECTED_MIGRATION_COUNT files, found $ACTUAL_COUNT."
            echo "Update EXPECTED_MIGRATION_COUNT in ci.yml and add a sentinel assertion for the new migration."
            exit 1
          fi
          echo "Sentinel B OK: all $EXPECTED_MIGRATION_COUNT migrations applied cleanly."

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + sqlx-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-sqlx
            target
          key: ${{ runner.os }}-migrations-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-migrations-cargo-

      - name: Install sqlx-cli (version derived from Cargo.lock)
        run: |
          # Derive the sqlx version from Cargo.lock so sqlx-cli can never
          # drift from the crate version.  Cargo.lock is the ground truth.
          # RFC-055: was pinned to 0.7.4 while sqlx is on 0.8.x — the .sqlx/
          # metadata format changed between majors, making the check inert.
          SQLX_VERSION=$(awk '/^name = "sqlx"$/{found=1} found && /^version/{gsub(/"/, "", $3); print $3; exit}' Cargo.lock)
          echo "Installing sqlx-cli ${SQLX_VERSION} (matches Cargo.lock sqlx = ${SQLX_VERSION})"
          # Only install if not already cached or version changed.
          if ! cargo-sqlx --version 2>/dev/null | grep -q "${SQLX_VERSION}"; then
            cargo install sqlx-cli \
              --version "${SQLX_VERSION}" \
              --no-default-features \
              --features postgres,rustls \
              --locked
          fi

      - name: Assert .sqlx/ metadata is up-to-date
        run: cargo sqlx prepare --check --workspace
        # Fails if:
        #   (a) .sqlx/ directory is missing — run `cargo sqlx prepare --workspace` locally
        #   (b) a sqlx::query! in storage.rs was added/changed without regenerating .sqlx/
        #   (c) schema changes caused query types to drift from the cached metadata
  
  security:
    name: Security — audit / deny / container scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-audit + cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Run cargo audit (report only – known issues tracked in audit.toml)
        run: cargo audit

      - name: Run cargo deny (advisories + licenses)
        run: cargo deny check advisories bans sources

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          
  # ── Compose stack smoke test (RFC-017) ────────────────────
  # Builds the gateway image, spins up the default Compose stack
  # (gateway + Postgres + Prometheus + Grafana), and verifies that a
  # contract can be created and an event validated end-to-end.
  compose-smoke:
    name: Compose — stack smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Run compose smoke test
        run: bash tests/compose_smoke.sh
        env:
          TAG: ci

  # ── Compose demo profile smoke test (RFC-017) ─────────────
  # Builds the gateway image (including demo-seeder binary), spins up the
  # stack with --profile demo, waits for the seeder to exit, and asserts
  # that > 500 audit_log rows were written and the three starter contracts
  # are published.  Seeder runs at 50/sec for 30s (≈1500 events) to keep
  # CI wall-clock time short.
  compose-demo-smoke:
    name: Compose — demo profile smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Run compose demo smoke test
        run: bash tests/compose_demo_smoke.sh
        env:
          TAG: ci
          SEEDER_RATE: "50"
          SEEDER_DURATION: "30s"
          MIN_AUDIT_ROWS: "500"

  # ── Deploy to Fly.io (main only) ──────────────────────────
  # Runs only on push to main (not on PRs).
  # All other CI jobs must be green before deploy fires.
  # Requires FLY_API_TOKEN repository secret:
  #   fly.io dashboard → contractgate-api → Tokens → create deploy token
  #   GitHub → repo Settings → Secrets → Actions → FLY_API_TOKEN
  deploy-fly:
    name: Deploy — Fly.io
    if: github.event_name == 'push'
    needs:
      - rust-check
      - dashboard
      - docker
      - migrations-check
      - security
      - compose-smoke
      - compose-demo-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # Build locally on the Actions runner (Docker is available on
        # ubuntu-latest).  --remote-only would have Fly's builder clone the
        # repo directly from GitHub, which fails for private repos because no
        # GitHub credentials are passed to the remote builder.
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
