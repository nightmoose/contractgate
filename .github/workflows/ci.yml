# ContractGate CI — runs on every push and pull request to main.
#
# Jobs:
#   rust-check  — cargo check + clippy + unit tests (no DB needed)
#   dashboard   — Next.js type-check + lint
#   docker      — verify the Dockerfile builds (no push)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Tells sqlx to use cached .sqlx/ metadata instead of a live DB
  SQLX_OFFLINE: "true"

jobs:
  # ── Rust ──────────────────────────────────────────────────
  rust-check:
    name: Rust — check / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Style gate runs first — cheap, fails fast, anchors `rustfmt.toml`.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ── Next.js dashboard ─────────────────────────────────────
  dashboard:
    name: Dashboard — type-check / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm install
        run: npm install

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          # Point at localhost during CI; no real backend needed for static build
          NEXT_PUBLIC_API_URL: "http://localhost:3001"

  # ── Docker build smoke-test ───────────────────────────────
  docker:
    name: Docker — build smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t contractgate-api:ci .

  # ── Migrations + sqlx metadata check (RFC-019) ───────────
  # 1. Spins a Postgres 16 service container.
  # 2. Applies every file in supabase/migrations/ in numeric order (ls -v).
  # 3. Asserts `cargo sqlx prepare --check` still matches the committed
  #    .sqlx/ query metadata — catches storage.rs changes that add/change
  #    queries without regenerating .sqlx/.
  # 4. Sentinel column check: confirms migration 009 applied cleanly.
  #
  # Contract: migration files must be named NNN_description.sql with no
  # gaps in the numeric prefix. A missing file means ls -v silently skips
  # it; the sentinel check below will catch the resulting schema gap.
  #
  # Prerequisites:
  #   .sqlx/ metadata must be committed (run `cargo sqlx prepare --workspace`
  #   locally against a Postgres 16 DB with all migrations applied, then
  #   commit the generated files). See RFC-019 rollout step 2.
  migrations-check:
    name: Migrations — apply + sqlx metadata check
    runs-on: ubuntu-latest
    # Override the global SQLX_OFFLINE=true so sqlx can connect to the
    # service container and verify query metadata against the live schema.
    env:
      SQLX_OFFLINE: "false"
      DATABASE_URL: postgres://contractgate:contractgate@localhost:5432/contractgate_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: contractgate
          POSTGRES_PASSWORD: contractgate
          POSTGRES_DB: contractgate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply migrations in order
        run: |
          echo "Applying migrations from supabase/migrations/ in numeric order..."
          for f in $(ls -v supabase/migrations/*.sql); do
            echo "  → $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied."

      - name: Assert migration 009 sentinel (github_integrations table)
        run: |
          RESULT=$(psql "$DATABASE_URL" -Atc \
            "SELECT to_regclass('public.github_integrations')::text")
          if [[ "$RESULT" != "github_integrations" ]]; then
            echo "::error::Migration 009 sentinel check failed — table github_integrations not found."
            echo "Expected all 9 migrations to apply cleanly. Check supabase/migrations/ for errors."
            exit 1
          fi
          echo "Sentinel OK: github_integrations table exists."

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + sqlx-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-sqlx
            target
          key: ${{ runner.os }}-migrations-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-migrations-cargo-

      - name: Install sqlx-cli (matches sqlx 0.7 dep)
        run: |
          # Only install if not already cached.
          if ! command -v cargo-sqlx &> /dev/null; then
            cargo install sqlx-cli \
              --version 0.7.4 \
              --no-default-features \
              --features postgres,rustls \
              --locked
          fi

      - name: Assert .sqlx/ metadata is up-to-date
        run: cargo sqlx prepare --check --workspace
        # Fails if:
        #   (a) .sqlx/ directory is missing — run `cargo sqlx prepare --workspace` locally
        #   (b) a sqlx::query! in storage.rs was added/changed without regenerating .sqlx/
        #   (c) schema changes caused query types to drift from the cached metadata

  # ── CLI cross-compile smoke (RFC-014) ─────────────────────
  # Builds the `contractgate` CLI binary for all four release targets.
  # This job runs before tagging to confirm the cross-compile is healthy.
  # Full release tarballs are produced by the release.yml workflow.
  cli-cross-compile:
    name: CLI — cross-compile smoke (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build CLI (cross)
        if: matrix.cross == true
        run: cross build --release --bin contractgate --target ${{ matrix.target }}

      - name: Build CLI (native)
        if: matrix.cross != true
        run: cargo build --release --bin contractgate --target ${{ matrix.target }}

  # ── Compose stack smoke test (RFC-017) ────────────────────
  # Builds the gateway image, spins up the default Compose stack
  # (gateway + Postgres + Prometheus + Grafana), and verifies that a
  # contract can be created and an event validated end-to-end.
  compose-smoke:
    name: Compose — stack smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Run compose smoke test
        run: bash tests/compose_smoke.sh
        env:
          TAG: ci

  # ── Compose demo profile smoke test (RFC-017) ─────────────
  # Builds the gateway image (including demo-seeder binary), spins up the
  # stack with --profile demo, waits for the seeder to exit, and asserts
  # that > 500 audit_log rows were written and the three starter contracts
  # are published.  Seeder runs at 50/sec for 30s (≈1500 events) to keep
  # CI wall-clock time short.
  compose-demo-smoke:
    name: Compose — demo profile smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Run compose demo smoke test
        run: bash tests/compose_demo_smoke.sh
        env:
          TAG: ci
          SEEDER_RATE: "50"
          SEEDER_DURATION: "30s"
          MIN_AUDIT_ROWS: "500"
