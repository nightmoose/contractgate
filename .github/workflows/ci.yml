# ContractGate CI — runs on every push and pull request to main.
#
# Jobs:
#   rust-check         — cargo fmt/check/clippy/test (no DB needed)
#   dashboard          — Next.js type-check + lint + build
#   docker             — Dockerfile builds (buildx + GHA layer cache, no push)
#   migrations-check   — apply migrations to Postgres 16, sqlx prepare --check
#   compose-smoke      — default compose stack end-to-end smoke
#   compose-demo-smoke — demo-profile compose stack + seeder assertion
#
# Cross-compile of the CLI is NOT in CI — it runs in release.yml on tag pushes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs when a new commit lands on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Tells sqlx to use cached .sqlx/ metadata instead of a live DB
  SQLX_OFFLINE: "true"

jobs:
  # ── Rust ──────────────────────────────────────────────────
  rust-check:
    name: Rust — check / clippy / test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Style gate runs first — cheap, fails fast, anchors `rustfmt.toml`.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ── Coverage ratchet gate (RFC-071) ───────────────────────
  # Measures unit-test line coverage with cargo-llvm-cov and compares it to
  # the committed baseline (coverage-baseline.txt). Ratchet semantics: fails
  # only on a DROP beyond tolerance — never enforces a fixed high bar. On a
  # fresh checkout with no baseline file, the script seeds it and passes.
  # Intentionally NOT in deploy-fly's `needs`: a regression flags the PR
  # without blocking the main-branch deploy while the gate beds in.
  coverage:
    name: Coverage — ratchet gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-llvm-cov
            target
          key: ${{ runner.os }}-cov-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cov-cargo-

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install cargo-llvm-cov --locked
          fi

      # SQLX_OFFLINE=true (global) keeps this DB-free: unit tests only, no
      # service container. Coverage stays deterministic across runs.
      - name: Coverage ratchet
        run: bash scripts/check-coverage.sh

      - name: Upload coverage summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-baseline.txt
          if-no-files-found: ignore

  # ── Next.js dashboard ─────────────────────────────────────
  dashboard:
    name: Dashboard — type-check / lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package.json

      - name: npm install
        run: npm install --legacy-peer-deps

      - name: TypeScript type-check
        run: npm run type-check

      #- name: ESLint
      #  run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          # Point at localhost during CI; no real backend needed for static build
          NEXT_PUBLIC_API_URL: "http://localhost:3001"

  # ── Docker build smoke-test ───────────────────────────────
  docker:
    name: Docker — build smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: contractgate-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Migrations + sqlx metadata check (RFC-019, RFC-055) ──
  # 1. Spins a Postgres 16 service container.
  # 2. Applies every file in supabase/migrations/ in numeric order (ls -v).
  # 3. Asserts `cargo sqlx prepare --check` still matches the committed
  #    .sqlx/ query metadata — catches storage.rs changes that add/change
  #    queries without regenerating .sqlx/.
  # 4. Sentinel check: confirms latest migration (027) and total count (27)
  #    applied cleanly.  Update EXPECTED_MIGRATION_COUNT when adding new
  #    migrations; add a new sentinel assertion for the latest schema object.
  #
  # Contract: migration files must be named NNN_description.sql with no
  # gaps in the numeric prefix. A missing file means ls -v silently skips
  # it; the sentinel check below will catch the resulting schema gap.
  #
  # Prerequisites:
  #   .sqlx/ metadata must be committed (run `cargo sqlx prepare --workspace`
  #   locally against a Postgres 16 DB with all migrations applied, then
  #   commit the generated files). See RFC-019 rollout step 2.
  migrations-check:
    name: Migrations — apply + sqlx metadata check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Override the global SQLX_OFFLINE=true so sqlx can connect to the
    # service container and verify query metadata against the live schema.
    env:
      SQLX_OFFLINE: "false"
      DATABASE_URL: postgres://contractgate:contractgate@localhost:5432/contractgate_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: contractgate
          POSTGRES_PASSWORD: contractgate
          POSTGRES_DB: contractgate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply migrations in order
        run: |
          echo "Applying migrations from supabase/migrations/ in numeric order..."
          for f in $(ls -v supabase/migrations/*.sql); do
            echo "  → $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied."

      - name: Assert migration sentinels (027 schema object + total count)
        run: |
          # Sentinel A — migration 026 (plan_tier): verify the orgs_plan_valid
          # constraint was updated to include 'growth' (replaces 'pro').
          CONSTRAINT_OK=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM information_schema.check_constraints
             WHERE constraint_schema = 'public'
               AND constraint_name    = 'orgs_plan_valid'
               AND check_clause LIKE '%growth%'")
          if [[ "$CONSTRAINT_OK" != "1" ]]; then
            echo "::error::Migration 026 sentinel failed — orgs_plan_valid constraint not found or does not include 'growth'."
            exit 1
          fi
          echo "Sentinel A OK: orgs_plan_valid constraint includes 'growth' (migration 026)."

          # Sentinel A2 — migration 027 (api_keys server-side issuance, RFC-056):
          # verify the authenticated INSERT policy is gone and the service_role
          # INSERT policy exists.
          AUTHENTICATED_INSERT=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM pg_policies
             WHERE schemaname = 'public'
               AND tablename  = 'api_keys'
               AND cmd        = 'INSERT'
               AND roles      @> ARRAY['authenticated']::name[]")
          if [[ "$AUTHENTICATED_INSERT" != "0" ]]; then
            echo "::error::Migration 027 sentinel failed — authenticated INSERT policy still exists on api_keys."
            exit 1
          fi
          SERVICE_INSERT=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM pg_policies
             WHERE schemaname = 'public'
               AND tablename  = 'api_keys'
               AND cmd        = 'INSERT'
               AND roles      @> ARRAY['service_role']::name[]")
          if [[ "$SERVICE_INSERT" != "1" ]]; then
            echo "::error::Migration 027 sentinel failed — service_role INSERT policy not found on api_keys."
            exit 1
          fi
          echo "Sentinel A2 OK: api_keys INSERT locked to service_role (migration 027)."

          # Sentinel A3 — migration 028 (Stripe billing): verify the orgs billing
          # columns and the webhook idempotency table exist.
          ORG_COLS=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM information_schema.columns
             WHERE table_schema = 'public'
               AND table_name   = 'orgs'
               AND column_name IN ('stripe_customer_id','stripe_subscription_id','plan_status')")
          if [[ "$ORG_COLS" != "3" ]]; then
            echo "::error::Migration 028 sentinel failed — expected 3 Stripe billing columns on orgs, found $ORG_COLS."
            exit 1
          fi
          EVENTS_TABLE=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM information_schema.tables
             WHERE table_schema = 'public'
               AND table_name   = 'stripe_processed_events'")
          if [[ "$EVENTS_TABLE" != "1" ]]; then
            echo "::error::Migration 028 sentinel failed — stripe_processed_events table not found."
            exit 1
          fi
          echo "Sentinel A3 OK: Stripe billing columns + idempotency table present (migration 028)."

          # Sentinel A4 — migration 029 (Stripe failure log): verify the
          # webhook failure-visibility table exists.
          FAILED_TABLE=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM information_schema.tables
             WHERE table_schema = 'public'
               AND table_name   = 'stripe_failed_events'")
          if [[ "$FAILED_TABLE" != "1" ]]; then
            echo "::error::Migration 029 sentinel failed — stripe_failed_events table not found."
            exit 1
          fi
          echo "Sentinel A4 OK: stripe_failed_events table present (migration 029)."

          # Sentinel A5 — migration 030 (early_access, retroactive file):
          # verify the landing-page early-access table exists.
          EA_TABLE=$(psql "$DATABASE_URL" -Atc \
            "SELECT COUNT(*) FROM information_schema.tables
             WHERE table_schema = 'public'
               AND table_name   = 'early_access'")
          if [[ "$EA_TABLE" != "1" ]]; then
            echo "::error::Migration 030 sentinel failed — early_access table not found."
            exit 1
          fi
          echo "Sentinel A5 OK: early_access table present (migration 030)."

          # Sentinel B — file count: the loop above applies every *.sql file.
          # Assert we have exactly the expected number so a new migration
          # automatically forces this sentinel to be updated.
          EXPECTED_MIGRATION_COUNT=30
          ACTUAL_COUNT=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')
          if [[ "$ACTUAL_COUNT" != "$EXPECTED_MIGRATION_COUNT" ]]; then
            echo "::error::Migration count mismatch — expected $EXPECTED_MIGRATION_COUNT files, found $ACTUAL_COUNT."
            echo "Update EXPECTED_MIGRATION_COUNT in ci.yml and add a sentinel assertion for the new migration."
            exit 1
          fi
          echo "Sentinel B OK: all $EXPECTED_MIGRATION_COUNT migrations applied cleanly."

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + sqlx-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-sqlx
            target
          key: ${{ runner.os }}-migrations-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-migrations-cargo-

      - name: Install sqlx-cli (version derived from Cargo.lock)
        run: |
          # Derive the sqlx version from Cargo.lock so sqlx-cli can never
          # drift from the crate version.  Cargo.lock is the ground truth.
          # RFC-055: was pinned to 0.7.4 while sqlx is on 0.8.x — the .sqlx/
          # metadata format changed between majors, making the check inert.
          SQLX_VERSION=$(awk '/^name = "sqlx"$/{found=1} found && /^version/{gsub(/"/, "", $3); print $3; exit}' Cargo.lock)
          echo "Installing sqlx-cli ${SQLX_VERSION} (matches Cargo.lock sqlx = ${SQLX_VERSION})"
          # Only install if not already cached or version changed.
          if ! cargo-sqlx --version 2>/dev/null | grep -q "${SQLX_VERSION}"; then
            cargo install sqlx-cli \
              --force \
              --version "${SQLX_VERSION}" \
              --no-default-features \
              --features postgres,rustls \
              --locked
          fi

      - name: Assert .sqlx/ metadata is up-to-date
        run: cargo sqlx prepare --check --workspace
        # Fails if:
        #   (a) .sqlx/ directory is missing — run `cargo sqlx prepare --workspace` locally
        #   (b) a sqlx::query! in storage.rs was added/changed without regenerating .sqlx/
        #   (c) schema changes caused query types to drift from the cached metadata

      # RFC-068: the org-isolation guarantee is the product's core selling point,
      # but its DB-backed tests are `#[ignore]`d (plain `cargo test` skips them).
      # This Postgres already has every migration applied, so run the
      # self-contained ignored tests here — the ones that build + clean up their
      # own data and need no running gateway. Named explicitly so the
      # gateway-dependent ignored tests (rfc_001_isolation, v1_ingest, metrics,
      # cli_push_pull) don't run here and fail for lack of a server.
      # NOTE: these tests live in `mod tests` inside src/main.rs, i.e. the
      # `contractgate-server` binary target — NOT the lib. Use `--bin` so the
      # filters actually match; a wrong target with `--exact` would match zero
      # tests and pass vacuously (a silent false-green).
      - name: Run self-contained DB-backed tests (org isolation + readiness)
        run: |
          set -o pipefail
          cargo test --bin contractgate-server -- --ignored --exact \
            tests::org_scoping::two_org_get_contract_isolation \
            tests::org_scoping::two_org_get_version_isolation \
            tests::org_scoping::quarantine_replay_race_guard \
            tests::rfc053_ready_tests::ready_returns_200_live_db \
            2>&1 | tee /tmp/iso_test.out
          # Guard against the silent false-green: `cargo test` exits 0 even when
          # a filter matches zero tests (e.g. a future rename). Assert exactly
          # the 4 expected tests actually ran.
          if ! grep -qE '4 passed; 0 failed' /tmp/iso_test.out; then
            echo "::error::Expected '4 passed; 0 failed' from the isolation/readiness tests — got something else. A test may have been renamed or skipped."
            exit 1
          fi

  security:
    name: Security — audit / deny / container scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-audit + cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Run cargo audit (report only – known issues tracked in audit.toml)
        run: cargo audit

      - name: Run cargo deny (advisories + licenses)
        run: cargo deny check advisories bans sources

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          
  # ── Compose stack smoke test (RFC-017) ────────────────────
  # Builds the gateway image, spins up the default Compose stack
  # (gateway + Postgres + Prometheus + Grafana), and verifies that a
  # contract can be created and an event validated end-to-end.
  compose-smoke:
    name: Compose — stack smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Run compose smoke test
        run: bash tests/compose_smoke.sh
        env:
          TAG: ci

  # ── Compose demo profile smoke test (RFC-017) ─────────────
  # Builds the gateway image (including demo-seeder binary), spins up the
  # stack with --profile demo, waits for the seeder to exit, and asserts
  # that > 500 audit_log rows were written and the three starter contracts
  # are published.  Seeder runs at 50/sec for 30s (≈1500 events) to keep
  # CI wall-clock time short.
  compose-demo-smoke:
    name: Compose — demo profile smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Run compose demo smoke test
        run: bash tests/compose_demo_smoke.sh
        env:
          TAG: ci
          SEEDER_RATE: "50"
          SEEDER_DURATION: "30s"
          MIN_AUDIT_ROWS: "500"

  # ── Deploy to Fly.io (main only) ──────────────────────────
  # Runs only on push to main (not on PRs).
  # All other CI jobs must be green before deploy fires.
  # Requires FLY_API_TOKEN repository secret:
  #   fly.io dashboard → contractgate-api → Tokens → create deploy token
  #   GitHub → repo Settings → Secrets → Actions → FLY_API_TOKEN
  deploy-fly:
    name: Deploy — Fly.io
    if: github.event_name == 'push'
    needs:
      - rust-check
      - dashboard
      - docker
      - migrations-check
      - security
      - compose-smoke
      - compose-demo-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # Build locally on the Actions runner (Docker is available on
        # ubuntu-latest).  --remote-only would have Fly's builder clone the
        # repo directly from GitHub, which fails for private repos because no
        # GitHub credentials are passed to the remote builder.
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
