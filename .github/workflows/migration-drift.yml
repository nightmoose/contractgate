# Migration drift check
#
# Daily comparison of prod's supabase_migrations.schema_migrations ledger
# against supabase/migrations/*.sql. Catches "file exists but prod never
# applied it" (or the reverse) — the exact failure mode behind the
# 2026-06-05 Stripe webhook incident (migration 026 had a file but was never
# applied to prod; see MAINTENANCE_LOG.md).
#
# Deliberately NOT run on pull_request: it needs a read-only prod DB
# credential, and PRs from forks must never get access to repo secrets.
# The fast, secret-free check (file count only) stays in ci.yml's
# migrations-check job (Sentinel B) for every PR.
#
# One-time setup (see docs/migration-drift-check-reference.md):
#   1. Create a read-only Postgres role in prod scoped to
#      supabase_migrations.schema_migrations only.
#   2. Add its connection string as the PROD_DATABASE_URL repo secret
#      (Settings → Secrets and variables → Actions).

name: Migration drift check

on:
  schedule:
    - cron: '15 6 * * *'  # 06:15 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-drift:
    name: Compare prod ledger to supabase/migrations/*.sql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run drift check against prod
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "::error::PROD_DATABASE_URL secret is not set. See docs/migration-drift-check-reference.md for the read-only role to create and the secret to add."
            exit 1
          fi
          chmod +x scripts/check_migration_drift.sh
          ./scripts/check_migration_drift.sh
